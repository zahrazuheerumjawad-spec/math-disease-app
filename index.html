<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fraction Division Game</title>
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#dff3ff,#fff1f7);
  text-align:center;
  padding:20px;
}
.box{
  background:white;
  max-width:780px;
  margin:auto;
  padding:25px;
  border-radius:25px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
h1{color:#5b3c88;}
#question{font-size:22px; line-height:1.5;}
button{
  display:block;
  width:90%;
  margin:12px auto;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:15px;
  background:#e8ddff;
  cursor:pointer;
}
button:hover{background:#cdb8ff;}
.correct{background:#b7f7c1!important;}
.wrong{background:#ffb6b6!important;}
#next{background:#5b3c88;color:white;}
#score{font-size:22px;font-weight:bold;color:#2b7a4b;}
#feedback{font-size:22px;font-weight:bold;}
</style>
</head>

<body>
<div class="box">
  <h1>Hi Grade 5A! 🌟</h1>
  <h2>Fraction Division Review Game</h2>
  <p id="question"></p>
  <div id="answers"></div>
  <p id="feedback"></p>
  <button id="next" onclick="nextQuestion()">Next Question</button>
  <p id="score"></p>
</div>

<script>
const questions = [
{q:"Sara has 12 oranges. She puts them equally into 3 baskets. How many oranges are in each basket?", a:["2","3","4","6"], correct:2},
{q:"A farmer has 15 pounds of rice. He divides it equally into 5 bags. How many pounds are in each bag?", a:["2","3","5","10"], correct:1},
{q:"Liam has 16 feet of ribbon. He uses 1/4 foot for each craft. How many crafts can he make?", a:["16","32","48","64"], correct:3},
{q:"Nora made 18 cups of lemonade. She pours 1/2 cup into each glass. How many glasses can she fill?", a:["9","18","27","36"], correct:3},
{q:"Which equation represents 7 wholes divided into halves?", a:["7 ÷ 2 = n","7 ÷ 1/2 = n","2 ÷ 7 = n","1/2 ÷ 7 = n"], correct:1},
{q:"Which expression has a whole number answer?", a:["5 ÷ 2","10 ÷ 1/5","3 ÷ 8","1/4 ÷ 3"], correct:1},
{q:"How many 1/4 pieces are in 8 wholes?", a:["16","24","32","40"], correct:2},
{q:"Amal has 3/4 pound of cheese. She divides it into 3 equal servings. How much is in each serving?", a:["1/4","1/3","3/4","1"], correct:0},
{q:"Which expression gives an answer less than 1?", a:["5 ÷ 1/5","1/2 ÷ 4","9 ÷ 1/3","8 ÷ 2"], correct:1},
{q:"Omar has 14 yards of rope. He cuts pieces that are 1/2 yard long. How many pieces can he make?", a:["7","14","21","28"], correct:3},
{q:"What is 10 ÷ 1/5?", a:["10","20","30","50"], correct:3},
{q:"What is 15 ÷ 1/3?", a:["15","30","45","60"], correct:2},
{q:"What is 20 ÷ 1/4?", a:["40","60","80","100"], correct:2},
{q:"Which equation checks 1/3 ÷ 2 = n?", a:["1/6 × 2 = 1/3","2 × 2 = 4","1/3 × 2 = 2/3","6 × 2 = 12"], correct:0},
{q:"How many thirds are in 6?", a:["6","12","18","24"], correct:2},
{q:"What is 4/5 ÷ 2?", a:["2/5","4/10","Both A and B","4/5"], correct:2},
{q:"A baker has 24 cookies. He packs 1/6 of a tray each time. How many trays can he fill?", a:["24","48","96","144"], correct:3},
{q:"What is 9 ÷ 1/9?", a:["9","18","81","90"], correct:2},
{q:"Which division gives a quotient greater than the dividend?", a:["12 ÷ 2","5 ÷ 1/5","16 ÷ 4","18 ÷ 6"], correct:1},
{q:"How many tenths are in 9?", a:["9","18","45","90"], correct:3},
{q:"What is 2/5 ÷ 2?", a:["1/5","2/10","Both A and B","2/5"], correct:2},
{q:"A pizza is cut into 8 equal pieces. If Ahmed eats 1/8 each time, how many times can he eat from one pizza?", a:["4","6","8","10"], correct:2},
{q:"What is 6 ÷ 1/6?", a:["6","12","24","36"], correct:3},
{q:"What is 25 ÷ 1/5?", a:["25","50","75","125"], correct:3},
{q:"How many halves are in 12?", a:["6","12","18","24"], correct:3},
{q:"Which expression has a quotient smaller than both numbers?", a:["1/3 ÷ 4","8 ÷ 1/2","9 ÷ 3","12 ÷ 1/4"], correct:0},
{q:"What is 3/8 ÷ 3?", a:["1/8","3/8","1/3","9/8"], correct:0},
{q:"Mia has 2/3 gallon of juice. She divides it equally among 2 cups. How much is in each cup?", a:["1/3","2/3","2/6","Both A and C"], correct:3},
{q:"How many fourths are in 5?", a:["5","10","15","20"], correct:3},
{q:"What is 30 ÷ 1/10?", a:["30","100","300","600"], correct:2},

{q:"What is 40 ÷ 1/5?", a:["40","80","120","200"], correct:3},
{q:"How many sixths are in 7?", a:["7","14","21","42"], correct:3},
{q:"What is 5/6 ÷ 5?", a:["1/6","5/6","1","5/30"], correct:0},
{q:"A teacher has 21 stickers. She gives 1/3 of a sticker pack each time. How many groups can she make?", a:["7","21","42","63"], correct:3},
{q:"What is 14 ÷ 1/2?", a:["7","14","21","28"], correct:3},
{q:"Which expression has a quotient greater than 20?", a:["4 ÷ 2","8 ÷ 1/4","6 ÷ 3","10 ÷ 2"], correct:1},
{q:"How many fifths are in 6?", a:["5","15","25","30"], correct:3},
{q:"What is 1/2 ÷ 8?", a:["1/16","1/8","4","8"], correct:0},
{q:"Ali has 18 meters of rope. He cuts pieces that are 1/6 meter long. How many pieces can he cut?", a:["18","36","72","108"], correct:3},
{q:"What is 24 ÷ 1/8?", a:["24","96","192","300"], correct:2},
{q:"Which expression has a quotient less than 1?", a:["3 ÷ 1/3","2/3 ÷ 4","9 ÷ 1/9","12 ÷ 1/2"], correct:1},
{q:"What is 7/10 ÷ 7?", a:["1/10","7/10","10/7","7"], correct:0},
{q:"How many eighths are in 3?", a:["8","16","24","32"], correct:2},
{q:"A baker has 32 muffins. He places 1/4 of a tray each time. How many trays can he fill?", a:["32","64","96","128"], correct:3},
{q:"What is 50 ÷ 1/10?", a:["50","100","250","500"], correct:3},
{q:"Which equation checks 2/5 ÷ 4 = n?", a:["1/10 × 4 = 2/5","2 × 5 = 10","2/5 × 4 = 8/5","4 × 4 = 16"], correct:0},
{q:"What is 4/7 ÷ 2?", a:["2/7","4/14","Both A and B","4/7"], correct:2},
{q:"How many thirds are in 12?", a:["12","24","36","48"], correct:2},
{q:"What is 16 ÷ 1/4?", a:["16","32","48","64"], correct:3},
{q:"A juice bottle holds 5 liters. If each serving is 1/5 liter, how many servings are there?", a:["5","10","15","25"], correct:3}
];

let current = 0;
let score = 0;
let answered = false;

function showQuestion(){
  answered = false;
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("score").innerHTML = "Score: " + score + " / " + questions.length;

  const q = questions[current];
  document.getElementById("question").innerHTML =
    "<b>Question " + (current + 1) + " of " + questions.length + ":</b><br>" + q.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.innerHTML = answer;
    btn.onclick = () => checkAnswer(btn, index);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(button, index){
  if(answered) return;
  answered = true;

  const correctIndex = questions[current].correct;
  const buttons = document.querySelectorAll("#answers button");

  if(index === correctIndex){
    button.classList.add("correct");
    document.getElementById("feedback").innerHTML = "✅ Correct!";
    score++;
  } else {
    button.classList.add("wrong");
    buttons[correctIndex].classList.add("correct");
    document.getElementById("feedback").innerHTML = "❌ Wrong! The correct answer is highlighted.";
  }

  document.getElementById("score").innerHTML = "Score: " + score + " / " + questions.length;
}

function nextQuestion(){
  current++;
  if(current < questions.length){
    showQuestion();
  } else {
    document.querySelector(".box").innerHTML = `
      <h1>Game Finished! 🎉</h1>
      <h2>Your Score: ${score} / ${questions.length}</h2>
      <p style="font-size:22px;">Great job Grade 5A! Keep practicing fraction division. 🌟</p>
      <button onclick="location.reload()">Play Again</button>
    `;
  }
}

showQuestion();
</script>
</body>
</html>
